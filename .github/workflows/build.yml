name: Build and Push Image

on:
  push:
    branches:
      - main
  schedule:
    # Check for new cloudflared releases daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "cloudflared version (e.g. 2026.3.0), leave empty to use latest"
        required: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cloudflared

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve cloudflared version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/cloudflare/cloudflared/releases/latest \
              | grep '"tag_name"' | cut -d'"' -f4)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved cloudflared version: ${VERSION}"

      - name: Check if image already exists
        id: check
        if: github.event_name == 'schedule'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ github.repository_owner }}/cloudflared/manifests/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image for ${VERSION} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64,linux/arm/v7
          push: true
          build-args: |
            CLOUDFLARED_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
